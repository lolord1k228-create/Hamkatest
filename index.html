        // ============================================================
        //  🐹 ТАП (з анти-автоклікером)
        // ============================================================
        function handleTap(e) {
            e.preventDefault();
            if (G.isBanned) {
                toast(`⛔ Штраф: ${getPenaltyAmount()}🟣`);
                return;
            }
            if (G.energy < 1) { toast('⚡ Немає енергії! Зачекай.');
                return; }

            const now = Date.now();
            G.tapHistory.push(now);
            if (G.tapHistory.length > 120) {
                G.tapHistory.shift();
            }

            const oneMinAgo = now - 60000;
            const tapsLastMin = G.tapHistory.filter(t => t > oneMinAgo).length;

            if (tapsLastMin > 1200) {
                const penalty = getPenaltyAmount();
                G.homa = Math.max(0, G.homa - penalty);
                G.isBanned = true;
                document.getElementById('antibotWarning').classList.add('show');
                document.getElementById('penaltyAmount').textContent = penalty;
                toast(`⚠️ Анти-автоклікер! Штраф: ${penalty}🟣`);

                const banTime = Math.min(60, 5 + G.level * 2);
                setTimeout(() => {
                    G.isBanned = false;
                    document.getElementById('antibotWarning').classList.remove('show');
                    toast('✅ Тапи розблоковано');
                }, banTime * 1000);
                return;
            }

            let x = e.clientX || e.touches?.[0]?.clientX || window.innerWidth / 2;
            let y = e.clientY || e.touches?.[0]?.clientY || window.innerHeight / 2;
            G.energy--;
            const inc = calcTapIncome();
            G.coins += inc;
            G.taps++;
            G.totalTaps++;
            addXP(1);
            G.seasonPoints = (G.seasonPoints || 0) + 1;

            if (G.totalTaps % 100 === 0) { G.eventHoma += 1;
                toast('🌸 +1 івенхом!'); }

            updateUI();
            showTapAnimation(x, y, inc);
            if (G.taps % 10 === 0) saveGame();
        }

        function getPenaltyAmount() {
            return Math.floor(10 + G.level * 15 + Math.pow(G.level, 1.5));
        }

        function showTapAnimation(x, y, amount) {
            const num = document.createElement('div');
            num.className = 'floating-number';
            num.textContent = '+' + amount + '💰';
            num.style.left = (x - 25) + 'px';
            num.style.top = (y - 35) + 'px';
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 900);

            for (let i = 0; i < 8; i++) {
                const coin = document.createElement('div');
                coin.className = 'coin-particle';
                coin.textContent = ['💰', '🪙', '✨', '💎', '🌟', '⭐', '💫', '🎯'][rand(0, 7)];
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 60;
                coin.style.left = (x - 10) + 'px';
                coin.style.top = (y - 10) + 'px';
                coin.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                coin.style.setProperty('--dy', (Math.sin(angle) * dist - 40) + 'px');
                document.body.appendChild(coin);
                setTimeout(() => coin.remove(), 700);
            }

            const btn = document.getElementById('tapBtn');
            if (btn) {
                const ripple = document.createElement('div');
                ripple.className = 'tap-ripple';
                ripple.style.left = '50%';
                ripple.style.top = '50%';
                ripple.style.transform = 'translate(-50%, -50%)';
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 800);
            }
        }

        // ============================================================
        //  🔐 АВТОРИЗАЦІЯ
        // ============================================================
        function switchAuthTab(mode) {
            authMode = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            if (mode === 'login') {
                document.querySelector('.auth-tab:first-child').classList.add('active');
                document.getElementById('authMainBtn').textContent = '🔐 Увійти';
                document.getElementById('authMainBtn').onclick = handleLogin;
                document.getElementById('authStatus').textContent = '🔐 Введіть дані для входу';
            } else {
                document.querySelector('.auth-tab:last-child').classList.add('active');
                document.getElementById('authMainBtn').textContent = '📝 Зареєструватися';
                document.getElementById('authMainBtn').onclick = handleRegister;
                document.getElementById('authStatus').textContent = '📝 Створіть новий акаунт';
            }
        }

        function handleRegister() {
            if (!auth) { document.getElementById('authError').textContent = '❌ Firebase не готовий.';
                return; }
            const nick = document.getElementById('authNick').value.trim();
            const pass = document.getElementById('authPass').value;
            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            if (!nick || !pass) { error.textContent = '❌ Введіть нік та пароль';
                return; }
            if (nick.length < 3) { error.textContent = '❌ Нік ≥3';
                return; }
            if (pass.length < 4) { error.textContent = '❌ Пароль ≥4';
                return; }
            error.textContent = '';
            success.textContent = '⏳ Реєстрація...';
            const email = nick.toLowerCase().replace(/[^a-z0-9]/g, '') + '@hamka.ua';

            auth.createUserWithEmailAndPassword(email, pass)
                .then(userCredential => {
                    const uid = userCredential.user.uid;
                    G.uid = uid;
                    G.isTelegramUser = false;
                    G.isGuest = false;
                    G.name = nick;
                    G.season = 2;
                    saveGame();
                    success.textContent = '✅ Реєстрація виконана!';
                    error.textContent = '';
                    startGame();
                })
                .catch(e => {
                    console.error('Register error:', e);
                    if (e.code === 'auth/email-already-in-use') {
                        error.textContent = '❌ Користувач вже існує';
                    } else {
                        error.textContent = '❌ ' + e.message;
                    }
                    success.textContent = '';
                });
        }

        function handleLogin() {
            if (!auth) { document.getElementById('authError').textContent = '❌ Firebase не готовий.';
                return; }
            const nick = document.getElementById('authNick').value.trim();
            const pass = document.getElementById('authPass').value;
            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            if (!nick || !pass) { error.textContent = '❌ Введіть нік та пароль';
                return; }
            if (nick.length < 3) { error.textContent = '❌ Нік ≥3';
                return; }
            if (pass.length < 4) { error.textContent = '❌ Пароль ≥4';
                return; }
            error.textContent = '';
            success.textContent = '⏳ Вхід...';
            const email = nick.toLowerCase().replace(/[^a-z0-9]/g, '') + '@hamka.ua';

            auth.signInWithEmailAndPassword(email, pass)
                .then(userCredential => {
                    G.uid = userCredential.user.uid;
                    G.isTelegramUser = false;
                    G.isGuest = false;
                    G.name = nick;
                    db.ref('users/' + G.uid).once('value').then(snap => {
                        if (snap.val()) { loadGame(snap.val()); } else { saveGame(); }
                        success.textContent = '✅ Вхід виконано!';
                        error.textContent = '';
                        startGame();
                    });
                })
                .catch(e => {
                    console.error('Login error:', e);
                    if (e.code === 'auth/user-not-found') {
                        error.textContent = '❌ Користувача не знайдено';
                    } else if (e.code === 'auth/wrong-password') {
                        error.textContent = '❌ Невірний пароль';
                    } else {
                        error.textContent = '❌ ' + e.message;
                    }
                    success.textContent = '';
                });
        }

        function handleTelegramGuest() {
            if (!auth) {
                document.getElementById('authError').textContent = '❌ Firebase не готовий.';
                return;
            }
            if (!tg || !tgUserId) {
                document.getElementById('authError').textContent = '❌ Запустіть гру в Telegram';
                return;
            }

            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            error.textContent = '';
            success.textContent = '⏳ Вхід через Telegram...';

            const uid = 'tg_' + tgUserId;
            G.uid = uid;
            G.isTelegramUser = true;
            G.isGuest = false;

            const tgUser = tg.initDataUnsafe?.user;
            if (tgUser) {
                let name = tgUser.first_name || 'TelegramUser';
                if (tgUser.last_name) name += ' ' + tgUser.last_name;
                G.name = '🟣 ' + name;
            }
            G.season = 2;

            db.ref('users/' + uid).once('value').then(snap => {
                if (snap.val()) {
                    loadGame(snap.val());
                    success.textContent = '✅ Дані завантажено!';
                } else {
                    saveGame();
                    success.textContent = '✅ Новий акаунт створено!';
                }
                error.textContent = '';
                startGame();
            }).catch(e => {
                console.error('Telegram login error:', e);
                error.textContent = '❌ Помилка: ' + e.message;
                success.textContent = '';
            });
        }

        function handleGuest() {
            if (!auth) {
                document.getElementById('authError').textContent = '❌ Firebase не готовий.';
                return;
            }
            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');
            error.textContent = '';
            success.textContent = '⏳ Вхід як гість...';

            auth.signInAnonymously()
                .then(userCredential => {
                    const uid = userCredential.user.uid;
                    G.uid = uid;
                    G.isTelegramUser = false;
                    G.isGuest = true;
                    G.name = 'Гість';
                    G.season = 2;
                    db.ref('users/' + uid).once('value').then(snap => {
                        if (snap.val()) {
                            const data = snap.val();
                            data.isGuest = true;
                            loadGame(data);
                        } else {
                            saveGame();
                        }
                        success.textContent = '✅ Гостьовий вхід!';
                        error.textContent = '';
                        startGame();
                    });
                })
                .catch(e => {
                    console.error('Guest error:', e);
                    error.textContent = '❌ ' + e.message;
                    success.textContent = '';
                });
        }

        function logout() {
            if (confirm('Вийти?')) {
                if (G.isTelegramUser) {
                    location.reload();
                } else {
                    auth.signOut();
                    location.reload();
                }
            }
        }

        // ============================================================
        //  🚀 СТАРТ ГРИ
        // ============================================================
        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            updateUI();
            buildPages();

            if (db) {
                db.ref('global/cryptoRate').once('value').then(snap => {
                    if (snap.val()) {
                        G.cryptoRate = snap.val();
                        G.cryptoHistory.push(G.cryptoRate);
                        if (G.cryptoHistory.length > 60) G.cryptoHistory.shift();
                        updateUI();
                    }
                }).catch(e => console.warn('Load global rate error:', e));

                db.ref('global/crypto2Rate').once('value').then(snap => {
                    if (snap.val()) {
                        G.crypto2Rate = snap.val();
                        G.crypto2History.push(G.crypto2Rate);
                        if (G.crypto2History.length > 60) G.crypto2History.shift();
                        updateUI();
                    }
                }).catch(e => console.warn('Load global rate error:', e));
            }

            setInterval(() => { updateCryptoRate(); }, 3000);
            setInterval(() => { updateCrypto2Rate(); }, 3000);
            setInterval(() => { G.tapHistory = []; }, 60000);

            setInterval(() => {
                let regen = G.energyRegen + G.upgrades.energyRegen;
                G.energy = Math.min(G.maxEnergy, G.energy + regen);
                if (G.autoTap > 0) G.coins += G.autoTap;
                if (G.autoXP > 0) addXP(G.autoXP);
                let now = Date.now();
                if (now - G.lastTimeReward >= 300000) {
                    G.lastTimeReward = now;
                    G.coins += 500;
                    toast('⏰ +500 монет');
                }
                updateUI();
                saveGame();
            }, 1000);

            setTimeout(updateTapButton, 100);
            saveGame();
            toast('🐹 Ласкаво просимо до Hamka! Сезон 2');
        }

        function buildPages() {
            document.getElementById('contentArea').innerHTML = `
                <div id="tab-games" class="page show">
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px;margin-bottom:4px;">
                        <button class="btn btn-g btn-lg" onclick="openGame('tap')">💸 Тап</button>
                        <button class="btn btn-o btn-lg" onclick="openGame('casino')">🎰</button>
                        <button class="btn btn-p btn-lg" onclick="openGame('upgrader')">🔧</button>
                        <button class="btn" style="background:#f97316;font-size:9px;padding:8px;" onclick="openGame('boss')">🐉</button>
                        <button class="btn" style="background:#ec4899;font-size:9px;padding:8px;" onclick="openGame('event')">🌸</button>
                    </div>
                    <div id="game-area"></div>
                </div>
                <div id="tab-shop" class="page"><div id="shop-content"></div></div>
                <div id="tab-crypto" class="page"><div id="crypto-area"></div></div>
                <div id="tab-vip" class="page"><div id="vip-area"></div></div>
                <div id="tab-profile" class="page"><div id="profile-area"></div></div>
                <div id="tab-inventory" class="page"><div id="inventory-area"></div></div>
                <div id="tab-top" class="page"><div id="top-area"></div></div>
            `;
            openGame('tap');
            renderShop();
            renderCrypto();
            renderVip();
            renderProfile();
            renderInventory();
            renderTop();
        }

        // ============================================================
        //  🔄 АВТОВХІД ДЛЯ TELEGRAM
        // ============================================================
        if (tg && tgUserId && !gameStarted) {
            setTimeout(() => {
                if (db) {
                    const uid = 'tg_' + tgUserId;
                    G.uid = uid;
                    G.isTelegramUser = true;
                    G.isGuest = false;

                    const tgUser = tg.initDataUnsafe?.user;
                    if (tgUser) {
                        let name = tgUser.first_name || 'TelegramUser';
                        if (tgUser.last_name) name += ' ' + tgUser.last_name;
                        G.name = '🟣 ' + name;
                    }
                    G.season = 2;

                    db.ref('users/' + uid).once('value').then(snap => {
                        if (snap.val()) {
                            loadGame(snap.val());
                            toast('✅ Дані завантажено!');
                        } else {
                            saveGame();
                            toast('👋 Ласкаво просимо!');
                        }
                        startGame();
                    }).catch(e => {
                        console.error('Auto login error:', e);
                        document.getElementById('authStatus').textContent = '❌ Помилка входу';
                    });
                } else {
                    document.getElementById('authStatus').textContent = '❌ Помилка підключення до сервера';
                }
            }, 500);
        } else {
            document.getElementById('authStatus').textContent = '🔐 Виберіть спосіб входу';

            if (!authListenerSet) {
                authListenerSet = true;
                auth?.onAuthStateChanged(user => {
                    if (user && !G.isTelegramUser) {
                        G.uid = user.uid;
                        G.isTelegramUser = false;
                        G.isGuest = user.isAnonymous || false;
                        db.ref('users/' + user.uid).once('value').then(snap => {
                            if (snap.val()) {
                                const data = snap.val();
                                data.isGuest = G.isGuest;
                                loadGame(data);
                            } else {
                                G.name = user.isAnonymous ? 'Гість' : 'Гравець';
                                G.season = 2;
                                saveGame();
                            }
                            startGame();
                        }).catch(e => {
                            console.error('Load error:', e);
                            startGame();
                        });
                    } else if (!user && !G.isTelegramUser) {
                        if (!gameStarted) {
                            document.getElementById('authScreen').style.display = 'flex';
                            document.getElementById('game').style.display = 'none';
                        }
                    }
                });
            }
        }

        console.log('🐹 Hamka — Сезон 2');
        console.log('✅ ОБМІН ВСІМА ПРЕДМЕТАМИ: гіфки, титули, ящики, валюта');
        console.log('✅ Нові ціни на титули');
        console.log('✅ Апгрейдер без гіфок та титулів (тільки предмети)');
        console.log('✅ З ящиків дропаються різні речі');
        console.log('✅ Топ-3: Король, Паладин, Хомяк');
        console.log('✅ Анти-автоклікер: 1200 тапів/хв');
    </script>
