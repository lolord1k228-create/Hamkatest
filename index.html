<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐹 Hamka — Крипто-клікер</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #07070b;
            --bg-card: #12121a;
            --border: #1e1e2e;
            --text: #e8e8f0;
            --text-secondary: #8888aa;
            --gold: #fbbf24;
            --crypto: #f472b6;
            --crypto2: #fbbf24;
            --radius: 12px;
            --neon-glow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }
        .app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #authScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 30px 24px;
            background: radial-gradient(ellipse at center, #0a0a1a, #07070b);
            overflow-y: auto;
        }
        #authScreen .logo {
            font-size: 72px;
            margin-bottom: 8px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(0, 255, 136, 0.2));
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px)
            }
            50% {
                transform: translateY(-8px)
            }
        }
        #authScreen h2 {
            color: var(--primary);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 2px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }
        #authScreen .subtitle {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 18px;
        }
        #authScreen .auth-tabs {
            display: flex;
            gap: 4px;
            width: 100%;
            max-width: 300px;
            margin-bottom: 12px;
        }
        #authScreen .auth-tab {
            flex: 1;
            padding: 8px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        #authScreen .auth-tab.active {
            border-color: var(--primary);
            color: var(--text);
            background: rgba(0, 255, 136, 0.08);
        }
        #authScreen .auth-tab:active {
            transform: scale(0.95);
        }
        #authScreen input {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 300px;
            margin-bottom: 8px;
            text-align: center;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        #authScreen input:focus {
            border-color: var(--primary);
        }
        #authScreen input::placeholder {
            color: #555;
        }
        #authScreen .btn {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            margin-top: 4px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.2s;
        }
        #authScreen .btn:active {
            transform: scale(0.97);
        }
        #authScreen .btn-g {
            background: linear-gradient(135deg, var(--primary), #00cc66);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }
        #authScreen .btn-tg {
            background: linear-gradient(135deg, #229ED9, #1a7ab5);
            color: #fff;
        }
        #authScreen .btn-p {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff;
        }
        #authScreen .btn-o {
            background: #f97316;
            color: #fff;
        }
        #authScreen .divider {
            color: #555;
            font-size: 10px;
            margin: 8px 0 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }
        #authScreen .divider::before,
        #authScreen .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        #authScreen .error {
            color: #ef4444;
            font-size: 11px;
            margin-top: 4px;
            min-height: 18px;
            text-align: center;
        }
        #authScreen .success {
            color: var(--primary);
            font-size: 11px;
            margin-top: 4px;
            min-height: 18px;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: rgba(18, 18, 26, 0.95);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 2px;
        }
        .top-bar .stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 7px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
        }
        .top-bar .stat .val {
            color: var(--text);
            font-size: 8px;
            font-weight: 700;
        }
        .top-bar .stat .gold {
            color: var(--gold);
        }
        .top-bar .stat .crypto {
            color: var(--crypto);
        }
        .top-bar .stat .crypto2 {
            color: var(--crypto2);
        }

        .tab-nav {
            display: flex;
            gap: 2px;
            padding: 4px 6px;
            background: rgba(18, 18, 26, 0.95);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .tab-nav button {
            flex: 1;
            min-width: 32px;
            padding: 4px 2px;
            border: none;
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-secondary);
            font-size: 7px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
        }
        .tab-nav button::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }
        .tab-nav button.active {
            color: var(--text);
            background: rgba(0, 255, 136, 0.08);
        }
        .tab-nav button.active::after {
            width: 60%;
        }
        .tab-nav button .tab-icon {
            font-size: 12px;
            display: block;
        }
        .tab-nav button .tab-label {
            font-size: 5px;
            display: block;
            margin-top: 1px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px;
            -webkit-overflow-scrolling: touch;
        }
        .content-area::-webkit-scrollbar {
            width: 3px;
        }
        .content-area::-webkit-scrollbar-track {
            background: var(--bg);
        }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        .page {
            display: none;
            animation: fadeSlide 0.3s ease;
        }
        .page.show {
            display: block;
        }
        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(8px)
            }
            100% {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .center-game {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            gap: 4px;
            padding: 4px 0;
        }

        .tap-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a3a, #12121a);
            border: 6px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 120px;
            box-shadow: 0 0 80px rgba(0, 255, 136, 0.3), inset 0 0 50px rgba(0, 255, 136, 0.08);
            transition: transform 0.08s linear;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }
        .tap-circle:active {
            transform: scale(0.92);
            box-shadow: 0 0 120px rgba(0, 255, 136, 0.5);
        }
        .tap-circle .tap-ripple {
            position: absolute;
            border-radius: 50%;
            border: 3px solid var(--primary);
            animation: ripple 0.7s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
                opacity: 1
            }
            100% {
                width: 330px;
                height: 330px;
                opacity: 0
            }
        }
        .tap-circle .tap-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .tap-circle .tap-emoji {
            font-size: 120px;
            z-index: 1;
        }
        .tap-balance {
            font-size: 18px;
            color: var(--gold);
            font-weight: 800;
            margin-bottom: 8px;
        }

        @media (max-width:400px) {
            .tap-circle {
                width: 250px;
                height: 250px;
                font-size: 100px;
            }
            .tap-circle .tap-emoji {
                font-size: 100px;
            }
            .tap-balance {
                font-size: 16px;
            }
        }
        @media (min-width:600px) {
            .tap-circle {
                width: 350px;
                height: 350px;
                font-size: 140px;
            }
            .tap-circle .tap-emoji {
                font-size: 140px;
            }
        }

        .bar-wrap {
            width: 92%;
            margin: 2px auto;
        }
        .energy-bar,
        .xp-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #fbbf24, #f97316);
            transition: width 0.4s;
        }
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #06b6d4);
            transition: width 0.4s;
        }
        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 5px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .bal {
            text-align: center;
            padding: 3px;
            font-size: 14px;
            font-weight: 800;
            color: var(--gold);
        }

        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 3px;
            padding: 2px 0;
            font-size: 6px;
            color: var(--text-secondary);
        }
        .stats-row .stat-item {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 1px 6px;
            border-radius: 12px;
        }
        .stats-row .stat-item .highlight {
            color: var(--primary);
        }

        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 7px;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            touch-action: manipulation;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-g {
            background: linear-gradient(135deg, var(--primary), #00cc66);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
        }
        .btn-o {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
        }
        .btn-r {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        .btn-b {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
        }
        .btn-p {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: #fff;
        }
        .btn-c {
            background: linear-gradient(135deg, var(--crypto), #db2777);
            color: #fff;
        }
        .btn-c2 {
            background: linear-gradient(135deg, var(--crypto2), #f59e0b);
            color: #000;
        }
        .btn-gold {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .btn-sm {
            padding: 2px 6px;
            font-size: 6px;
        }
        .btn-lg {
            padding: 6px 12px;
            font-size: 9px;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .card {
            background: var(--bg-card);
            padding: 6px 8px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 4px;
        }
        .card .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .card-title {
            font-size: 8px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }

        .toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 8px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            border: 1px solid var(--primary);
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .floating-number {
            position: fixed;
            font-size: 24px;
            font-weight: 800;
            pointer-events: none;
            z-index: 1000;
            background: linear-gradient(135deg, var(--gold), #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: floatUp 0.8s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.8)
            }
            30% {
                transform: translateY(-30px) scale(1.2)
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0.6)
            }
        }
        .coin-particle {
            position: fixed;
            width: 18px;
            height: 18px;
            font-size: 16px;
            pointer-events: none;
            z-index: 999;
            animation: coinFly 0.6s ease-out forwards;
        }
        @keyframes coinFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1)
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx, 50px), var(--dy, -65px)) scale(0.3)
            }
        }

        .shop-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 3px;
            flex-wrap: wrap;
        }
        .shop-tab {
            flex: 1;
            min-width: 32px;
            padding: 3px 4px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text-secondary);
            font-size: 5px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .shop-tab.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .inventory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            margin: 2px 0;
        }
        .inv-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius);
            padding: 2px 5px;
            text-align: center;
            min-width: 34px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }
        .inv-item:active {
            transform: scale(0.95);
        }
        .inv-item .icon {
            font-size: 14px;
            display: block;
        }
        .inv-item .count {
            font-size: 5px;
            color: var(--gold);
        }
        .inv-item .name {
            font-size: 5px;
            color: var(--text-secondary);
        }
        .inv-item.chest {
            border-color: var(--gold);
            background: rgba(251, 191, 36, 0.08);
        }
        .inv-item.chest:active {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .chest-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .chest-modal.show {
            display: flex;
        }
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
        .chest-modal .modal-content {
            background: var(--bg-card);
            border: 2px solid var(--gold);
            border-radius: var(--radius);
            padding: 20px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            animation: modalPop 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        @keyframes modalPop {
            0% {
                transform: scale(0.7);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .chest-modal .chest-icon {
            font-size: 80px;
            margin-bottom: 10px;
            animation: chestShake 0.5s ease;
        }
        @keyframes chestShake {
            0% {
                transform: rotate(0deg) scale(1);
            }
            25% {
                transform: rotate(-15deg) scale(1.1);
            }
            50% {
                transform: rotate(15deg) scale(1.1);
            }
            75% {
                transform: rotate(-10deg) scale(1.05);
            }
            100% {
                transform: rotate(0deg) scale(1);
            }
        }
        .chest-modal .reward-text {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
            margin: 8px 0;
        }
        .chest-modal .reward-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .chest-modal .close-btn {
            padding: 8px 24px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), #00cc66);
            color: #000;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chest-modal .close-btn:active {
            transform: scale(0.95);
        }

        .promo-row {
            display: flex;
            gap: 2px;
            padding: 2px 6px;
            background: rgba(18, 18, 26, 0.95);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .promo-row input {
            flex: 1;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: var(--radius);
            font-size: 6px;
            outline: none;
        }
        .promo-row .promo-btn {
            display: block;
        }

        .crypto-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(18, 18, 26, 0.9));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 6px 8px;
            margin-bottom: 3px;
        }
        .crypto-card .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .crypto-card .symbol {
            font-size: 12px;
            font-weight: 800;
            color: var(--crypto);
        }
        .crypto-card .price {
            font-size: 10px;
            font-weight: 800;
            color: var(--text);
        }
        .crypto-card .change {
            font-size: 8px;
            font-weight: 700;
        }
        .crypto-card .change.up {
            color: var(--primary);
        }
        .crypto-card .change.down {
            color: #ef4444;
        }

        .chart-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
            margin-bottom: 3px;
            height: 80px;
        }

        .market-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 3px 6px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 2px;
        }
        .market-item .info .name {
            font-size: 7px;
            font-weight: 600;
        }
        .market-item .info .desc {
            font-size: 4px;
            color: var(--text-secondary);
        }
        .market-item .price {
            color: var(--gold);
            font-weight: 700;
            font-size: 7px;
        }

        .trader-card {
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.9), rgba(18, 18, 26, 0.9));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px 6px;
            margin-bottom: 3px;
        }
        .trader-card .name {
            font-size: 8px;

        function rand(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

        function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function formatNum(n) {
            if (n < 1000) return Math.floor(n).toString();
            if (n < 1e6) return (n / 1e3).toFixed(1) + 'K';
            if (n < 1e9) return (n / 1e6).toFixed(1) + 'M';
            if (n < 1e12) return (n / 1e9).toFixed(1) + 'B';
            return (n / 1e12).toFixed(1) + 'T';
        }

        function getLevelReward(l) {
            for (let i = 0; i < LEVELS.length; i++) {
                if (LEVELS[i].l === l) return LEVELS[i].rw;
            }
            return 0;
        }

        function getLevelXp(l) {
            for (let i = 0; i < LEVELS.length; i++) {
                if (LEVELS[i].l === l) return LEVELS[i].x;
            }
            return 0;
        }

        function calcMaxEnergy() {
            return 100 + G.upgrades.maxEnergy * 50 + G.upgrades.energyUp * 100;
        }

        function calcTapIncome() {
            let base = G.tapLevel + G.upgrades.tapLevel;
            let powerMul = 1 + G.upgrades.tapPower * 0.5;
            let boost = G.coinBoost * (1 + G.upgrades.coinBoost * 0.5);
            let inc = (rand(1, 5) + base) * boost * powerMul;
            let critChance = G.crit + G.upgrades.critChance * 0.05;
            if (Math.random() < critChance) {
                inc *= 2;
                toast('💥 КРИТ! x2');
            }
            return Math.floor(inc);
        }

            const skin = SHOP_SKINS.find(s => s.id === skinId);

            if (G.ownedShopSkins.includes(skinId)) {

                G.skins.plow.use = false;

                saveGame();
                updateTapButton();
                renderShop();

                return;

            if (G.homa < skin.price) {
                toast(`❌ Потрібно ${skin.price}🟣`);

            G.homa -= skin.price;
            G.ownedShopSkins.push(skinId);
            G.activeShopSkin = skinId;
            G.skins.plow.use = false;
            G.skins.ronaldo.use = false;
            toast(`✅ Куплено скін «${skin.name}»!`);

            renderShop();
            renderVip();
            renderInventory();
        }

        function deleteAccount() {
            if (!G.uid) { toast('❌ Немає акаунта'); return; }
            if (!confirm('⚠️ ВИ ВПЕВНЕНІ? Це видалить ВЕСЬ ваш прогрес назавжди!')) return;
            if (!confirm('🔄 ДРУГЕ ПІДТВЕРДЖЕННЯ: Всі дані будуть втрачені!')) return;

            toast('⏳ Видалення акаунта...');

            const deletePromises = [];
            deletePromises.push(db.ref('users/' + G.uid).remove().catch(e => console.warn('User delete error:', e)));
            deletePromises.push(db.ref('public_users/' + G.uid).remove().catch(e => console.warn('Public delete error:',
                e)));

            if (!G.isTelegramUser && auth.currentUser) {
                deletePromises.push(auth.currentUser.delete().catch(e => {
                    console.warn('Auth delete error:', e);
                    auth.signOut();
                }));
            }

            Promise.all(deletePromises).then(() => {
                toast('✅ Акаунт видалено!');
                localStorage.removeItem('hamka_guest_save');
                localStorage.removeItem('hamka_save');
                setTimeout(() => {
                    location.reload();
                }, 1000);
            }).catch(e => {
                console.error('Delete error:', e);
                toast('❌ Помилка видалення: ' + e.message);
            });
        }

        function openChestModal(type) {
            const modal = document.getElementById('chestModal');
            const icon = document.getElementById('chestIcon');
            const rewardText = document.getElementById('chestRewardText');
            const rewardDesc = document.getElementById('chestRewardDesc');

            const box = BOXES.find(b => b.id === type);
            if (!box || !G.chests[type] || G.chests[type] <= 0) {
                toast('❌ Немає ящиків');
                return;
            }

            G.chests[type]--;
            if (G.chests[type] === 0) delete G.chests[type];

            const reward = rand(box.homyMin, box.homyMax);
            const bonus = Math.floor(reward * (1 + G.luck * 0.1));
            const finalReward = bonus;

            G.homa += finalReward;

            icon.textContent = box.emoji;
            rewardText.textContent = `🎉 +${finalReward} 🟣 Хом!`;
            rewardDesc.textContent = `Ящик «${box.name}» відкрито!`;

            modal.classList.add('show');

            icon.style.animation = 'none';
            setTimeout(() => {
                icon.style.animation = 'chestShake 0.5s ease';
            }, 10);

            // Додаткові дропи з ящиків
            const extraDrop = Math.random();

                const g = GIFS[rand(0, GIFS.length - 1)];

                setTimeout(() => {
                    toast(`🎨 +${g.id} (додатковий дроп!)`);

                const titles = ['king', 'lord', 'knight', 'hamka', 'letniy', 'sunny', 'leto'];

                addTitle(nt);
                setTimeout(() => {
                    toast(`🏅 Титул ${TITLES[nt]?.name || nt} (додатковий дроп!)`);
                }, 400);
            } else if (extraDrop < 0.45) {
                const coinsBonus = rand(1000, 5000);
                G.coins += coinsBonus;
                setTimeout(() => {
                    toast(`💰 +${coinsBonus} монет (додатковий дроп!)`);
                }, 400);
            } else if (extraDrop < 0.52) {
                const cryptoBonus = rand(1, 5) / 100;
                G.crypto += cryptoBonus;
                setTimeout(() => {
                    toast(`₿ +${cryptoBonus.toFixed(2)} B HAM (додатковий дроп!)`);
                }, 400);

        function drawLineChart(containerId, data, color) {
            const container = document.getElementById(containerId);
            if (!container) return;
            if (data.length < 2) {
                container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:8px;">⏳ Накопичення даних...</div>';
                return;
            }
            const height = container.clientHeight || 70;
            const width = container.clientWidth || 300;
            const padding = 6;
            const graphH = height - padding * 2;
            const graphW = width - padding * 2;
            const min = Math.min(...data) * 0.998;
            const max = Math.max(...data) * 1.002;
            const range = max - min || 1;
            let points = '';
            let firstPoint = true;
            data.forEach((val, i) => {
                const x = padding + (i / (data.length - 1)) * graphW;
                const y = padding + graphH - ((val - min) / range) * graphH;
                if (firstPoint) { points += `${x},${y}`;
                    firstPoint = false; } else { points += ` ${x},${y}`; }
            });
            const lastVal = data[data.length - 1];
            const firstVal = data[0];
            const isGreen = lastVal >= firstVal;
            const color2 = isGreen ? color || '#00ff88' : '#ef4444';
            const gradientId = 'grad_' + Date.now() + '_' + containerId;
            const svg = `
                <svg width="100%" height="100%" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block;">
                    <defs>
                        <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="${color2}" stop-opacity="0.4"/>
                            <stop offset="100%" stop-color="${color2}" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    <polygon points="${padding},${padding+graphH} ${points} ${padding+graphW},${padding+graphH}" fill="url(#${gradientId})"/>
                    <polyline points="${points}" fill="none" stroke="${color2}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="${padding + graphW}" cy="${padding + graphH - ((lastVal - min) / range) * graphH}" r="3" fill="${color2}"/>
                </svg>
            `;
            const changePercent = ((lastVal - firstVal) / firstVal * 100);
            const changeText = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
            const changeClass = changePercent >= 0 ? 'up' : 'down';
            container.innerHTML = `
                ${svg}
                <div style="display:flex;justify-content:space-between;font-size:5px;color:var(--text-secondary);padding:2px 4px;margin-top:-4px;">
                    <span>📊 ${data.length} точок</span>
                    <span class="${changeClass}" style="font-weight:700;">${changeText}</span>
                    <span>${lastVal}💰</span>
                </div>
            `;
        }

        function getPriceCoin(item) {
            const base = { maxEnergy: 2000, autoXP: 5000, energyRegen: 15000, tapLevel: 1000, coinBoost: 5000,
                energyUp: 5000, tapPower: 15000, critChance: 10000, luckB: 3000 };
            const mult = { maxEnergy: 1.5, autoXP: 2, energyRegen: 2.5, tapLevel: 1.8, coinBoost: 2, energyUp: 1.8,
                tapPower: 2.5, critChance: 2, luckB: 2 };
            if (item === 'autoTap') return 1500 + (G.upgrades.autoTap || 0) * 2000;
            if (item === 'tapLevel') return Math.floor(base.tapLevel * Math.pow(mult.tapLevel, G.upgrades.tapLevel || 0));
            return Math.floor((base[item] || 1000) * Math.pow((mult[item] || 1.5), (G.upgrades[item] || 0)));
        }

        function buyItemCoin(item) {
            const p = getPriceCoin(item);
            if (G.coins < p) { toast(`❌ Потрібно ${p}💰`);
                return; }
            G.coins -= p;
            if (item === 'maxEnergy') { G.maxEnergy += 50;
                G.energy += 50;
                G.upgrades.maxEnergy++; } else if (item === 'autoXP') { G.autoXP++;
                G.upgrades.autoXP++; } else if (item === 'xpBoost') { addXP(100); } else if (item === 'autoTap') {
                G.autoTap++;
                G.upgrades.autoTap++;
            } else if (item === 'energyRegen') { G.upgrades.energyRegen++; } else if (item === 'tapLevel') { G.upgrades
                    .tapLevel++; } else if (item === 'coinBoost') { G.upgrades.coinBoost++; } else if (item ===
                'energyUp') { G.maxEnergy += 100;
                G.energy += 100;
                G.upgrades.energyUp++; } else if (item === 'tapPower') { G.upgrades.tapPower++; } else if (item ===
                'critChance') { G.upgrades.critChance++; } else if (item === 'luckB') { G.upgrades.luckB++; }
            toast('✅ Куплено!');
            updateUI();
            saveGame();
            renderShop();
        }

        function createTradeOffer() {
            const offerType = document.getElementById('tradeOfferType').value;
            const offerId = document.getElementById('tradeOfferId').value;
            const offerAmount = parseInt(document.getElementById('tradeOfferAmount').value) || 1;
            const wantType = document.getElementById('tradeWantType').value;
            const wantId = document.getElementById('tradeWantId').value;
            const wantAmount = parseInt(document.getElementById('tradeWantAmount').value) || 1;

            if (!offerId) { toast('Виберіть що віддаєте'); return; }
            if (!wantId) { toast('Виберіть що хочете отримати'); return; }

            // Перевіряємо чи є предмет у гравця
            if (offerType === 'gif') {
                if (!hasGif(offerId) || getGifCount(offerId) < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} гіфок ${offerId}`);
                    return;
                }
                removeGif(offerId, offerAmount);
            } else if (offerType === 'title') {
                if (!hasTitle(offerId) || G.ownedTitles[offerId] < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} титулів ${offerId}`);
                    return;
                }
                removeTitle(offerId, offerAmount);
            } else if (offerType === 'chest') {
                if (!G.chests[offerId] || G.chests[offerId] < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} ящиків ${offerId}`);
                    return;
                }
                G.chests[offerId] -= offerAmount;
                if (G.chests[offerId] <= 0) delete G.chests[offerId];
            } else if (offerType === 'coins') {
                if (G.coins < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} монет`);
                    return;
                }
                G.coins -= offerAmount;
            } else if (offerType === 'homa') {
                if (G.homa < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} Хом`);
                    return;
                }
                G.homa -= offerAmount;
            } else if (offerType === 'crypto') {
                if (G.crypto < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} B HAM`);
                    return;
                }
                G.crypto -= offerAmount;
            } else if (offerType === 'crypto2') {
                if (G.crypto2 < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} T HAM`);
                    return;
                }
                G.crypto2 -= offerAmount;
            } else if (offerType === 'eventHoma') {
                if (G.eventHoma < offerAmount) {
                    toast(`❌ У вас немає ${offerAmount} Івенхомів`);
                    return;
                }
                G.eventHoma -= offerAmount;
            }

            // Створюємо пропозицію
            const offer = {
                id: Date.now() + '_' + G.uid,
                sellerId: G.uid,
                sellerName: G.name,
                offerType: offerType,
                offerId: offerId,
                offerAmount: offerAmount,
                wantType: wantType,
                wantId: wantId,
                wantAmount: wantAmount,
                timestamp: Date.now(),
                status: 'active'
            };

            db.ref('trade_offers/' + offer.id).set(offer).then(() => {
                toast('✅ Пропозицію обміну створено!');
                renderTradersTab();
                saveGame();
            }).catch(e => {
                toast('❌ Помилка створення пропозиції');
                console.error(e);
                // Повертаємо предмети при помилці
                if (offerType === 'gif') addGif(offerId, offerAmount);
                else if (offerType === 'title') addTitle(offerId, offerAmount);
                else if (offerType === 'chest') G.chests[offerId] = (G.chests[offerId] || 0) + offerAmount;
                else if (offerType === 'coins') G.coins += offerAmount;
                else if (offerType === 'homa') G.homa += offerAmount;
                else if (offerType === 'crypto') G.crypto += offerAmount;
                else if (offerType === 'crypto2') G.crypto2 += offerAmount;
                else if (offerType === 'eventHoma') G.eventHoma += offerAmount;
                saveGame();
            });
        }

        function updateTradeSelects() {
            // Для віддачі
            const offerSelect = document.getElementById('tradeOfferId');
            const offerType = document.getElementById('tradeOfferType').value;
            if (offerSelect) {
                offerSelect.innerHTML = '<option value="">Виберіть предмет...</option>';
                if (offerType === 'gif') {
                    Object.entries(G.ownedGifs).forEach(([id, count]) => {
                        if (count > 0) offerSelect.innerHTML += `<option value="${id}">${id} (x${count})</option>`;
                    });
                } else if (offerType === 'title') {
                    Object.entries(G.ownedTitles).forEach(([id, count]) => {
                        if (count > 0 && id !== 'none') {
                            const t = TITLES[id] || { name: id };
                            offerSelect.innerHTML += `<option value="${id}">${t.name} (x${count})</option>`;
                        }
                    });
                } else if (offerType === 'chest') {
                    Object.entries(G.chests).forEach(([id, count]) => {
                        if (count > 0) {
                            const box = BOXES.find(b => b.id === id);
                            offerSelect.innerHTML += `<option value="${id}">${box?.name || id} (x${count})</option>`;
                        }
                    });
                } else if (offerType === 'coins') {
                    offerSelect.innerHTML = `<option value="coins">Монети (${formatNum(G.coins)})</option>`;
                } else if (offerType === 'homa') {
                    offerSelect.innerHTML = `<option value="homa">Хоми (${formatNum(G.homa)})</option>`;
                } else if (offerType === 'crypto') {
                    offerSelect.innerHTML = `<option value="crypto">B HAM (${G.crypto.toFixed(2)})</option>`;
                } else if (offerType === 'crypto2') {
                    offerSelect.innerHTML = `<option value="crypto2">T HAM (${G.crypto2.toFixed(2)})</option>`;
                } else if (offerType === 'eventHoma') {
                    offerSelect.innerHTML = `<option value="eventHoma">Івенхоми (${G.eventHoma.toFixed(2)})</option>`;
                }
            }

            // Для бажаного
            const wantSelect = document.getElementById('tradeWantId');
            const wantType = document.getElementById('tradeWantType').value;
            if (wantSelect) {
                wantSelect.innerHTML = '<option value="">Виберіть предмет...</option>';
                if (wantType === 'gif') {
                    GIFS.forEach(g => {
                        wantSelect.innerHTML += `<option value="${g.id}">${g.id}</option>`;
                    });
                } else if (wantType === 'title') {
                    Object.keys(TITLES).forEach(id => {
                        if (id !== 'none') {
                            const t = TITLES[id];
                            wantSelect.innerHTML += `<option value="${id}">${t.name}</option>`;
                        }
                    });
                } else if (wantType === 'chest') {
                    BOXES.forEach(b => {
                        wantSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                    });
                } else if (wantType === 'coins') {
                    wantSelect.innerHTML = `<option value="coins">Монети</option>`;
                } else if (wantType === 'homa') {
                    wantSelect.innerHTML = `<option value="homa">Хоми</option>`;
                } else if (wantType === 'crypto') {
                    wantSelect.innerHTML = `<option value="crypto">B HAM</option>`;
                } else if (wantType === 'crypto2') {
                    wantSelect.innerHTML = `<option value="crypto2">T HAM</option>`;
                } else if (wantType === 'eventHoma') {
                    wantSelect.innerHTML = `<option value="eventHoma">Івенхоми</option>`;

        function loadTradeOffers() {
            db.ref('trade_offers').orderByChild('status').equalTo('active').once('value').then(snap => {
                const container = document.getElementById('tradeOffersList');
                if (!container) return;

                const offers = [];
                snap.forEach(child => {
                    const data = child.val();
                    if (data && data.status === 'active') {
                        offers.push({ id: child.key, ...data });
                    }
                });

                if (offers.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-secondary);font-size:7px;padding:4px;">Немає активних пропозицій</p>';
                    return;
                }

                let html = '';
                offers.forEach(offer => {
                    const isOwn = offer.sellerId === G.uid;
                    const offerTypeNames = {
                        'gif': '🎨 Гіфка',
                        'title': '🏅 Титул',
                        'chest': '📦 Ящик',
                        'coins': '💰 Монети',
                        'homa': '🟣 Хоми',
                        'crypto': '₿ B HAM',
                        'crypto2': '🪙 T HAM',
                        'eventHoma': '🌸 Івенхоми'
                    };
                    const offerDisplay = offer.offerType === 'gif' ? offer.offerId :
                        offer.offerType === 'title' ? (TITLES[offer.offerId]?.name || offer.offerId) :
                        offer.offerType === 'chest' ? (BOXES.find(b => b.id === offer.offerId)?.name || offer.offerId) :
                        offer.offerId;
                    const wantDisplay = offer.wantType === 'gif' ? offer.wantId :
                        offer.wantType === 'title' ? (TITLES[offer.wantId]?.name || offer.wantId) :
                        offer.wantType === 'chest' ? (BOXES.find(b => b.id === offer.wantId)?.name || offer.wantId) :
                        offer.wantId;

                    html += `
                        <div class="market-item" style="${isOwn ? 'border-color:var(--gold);' : ''}">
                            <div class="info">
                                <div class="name">${offer.sellerName}</div>
                                <div style="font-size:5px;color:var(--text-secondary);">
                                    Віддає: ${offerTypeNames[offer.offerType]} ${offerDisplay} x${offer.offerAmount} → 
                                    Отримує: ${offerTypeNames[offer.wantType]} ${wantDisplay} x${offer.wantAmount}
                                </div>
                            </div>
                            <div>
                                ${!isOwn ? `<button class="btn btn-g btn-sm" onclick="acceptTradeOffer('${offer.id}')">🤝 Обміняти</button>` : 
                                `<button class="btn btn-r btn-sm" onclick="cancelTradeOffer('${offer.id}')">❌ Скасувати</button>`}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            }).catch(e => {
                console.error(e);
                const container = document.getElementById('tradeOffersList');
                if (container) container.innerHTML = '<p style="color:#f88;font-size:7px;padding:4px;">❌ Помилка завантаження</p>';
            });
        }

        function renderUpgrader() {
            const inItem = G.selectedItemIn ? UPGRADE_ITEMS.find(i => i.id === G.selectedItemIn) : null;
            const outItem = G.selectedItemOut ? UPGRADE_ITEMS.find(i => i.id === G.selectedItemOut) : null;
            let chance = 0;
            if (inItem && outItem) { chance = Math.min(75, (inItem.price / outItem.price) * 100); }

            let html = `
                <div class="upgrader-container">
                    <div class="upgrader-card ${inItem ? 'selected' : ''}" onclick="if(!inItem)G.selectedItemIn=null;renderUpgrader()">
                        <div class="icon-wrap">${inItem ? inItem.image : '➕'}</div>
                        <div class="item-name">${inItem ? inItem.name : 'Оберіть'}</div>
                        <div class="item-price">${inItem ? '$' + inItem.price.toLocaleString() : '—'}</div>
                        ${inItem ? `<div style="font-size:5px;color:var(--text-secondary);">${inItem.rarity}</div>` : ''}
                    </div>
                    <div class="upgrader-center">
                        <div><div class="chance-value">${chance.toFixed(0)}%</div><div class="chance-label">Макс.75%</div></div>
                        <button class="upgrade-btn ${!inItem || !outItem ? 'disabled' : ''}" onclick="performUpgrade()">🚀</button>
                    </div>
                    <div class="upgrader-card ${outItem ? 'selected' : ''}" onclick="if(!outItem)G.selectedItemOut=null;renderUpgrader()">
                        <div class="icon-wrap">${outItem ? outItem.image : '❓'}</div>
                        <div class="item-name">${outItem ? outItem.name : 'Бажаний'}</div>
                        <div class="item-price">${outItem ? '$' + outItem.price.toLocaleString() : '—'}</div>
                        ${outItem ? `<div style="font-size:5px;color:var(--text-secondary);">${outItem.rarity}</div>` : ''}
                    </div>
                </div>
                <div class="card"><div class="card-title">🎁 Ваші предмети</div><div class="inventory-grid">`;

            let hasItems = false;
            for (let [id, count] of Object.entries(G.upgradeInventory)) {
                if (count > 0) {
                    hasItems = true;
                    const item = UPGRADE_ITEMS.find(i => i.id === id);
                    if (item) {
                        html += `<div class="inv-item ${G.selectedItemIn === id ? 'selected' : ''}" onclick="G.selectedItemIn='${id}';renderUpgrader()">
                            <span class="icon">${item.image}</span>
                            <span class="count">x${count}</span>
                            <span class="name">${item.name.slice(0,5)}</span>
                        </div>`;
                    }
                }
            }
            if (!hasItems) { html += `<div style="color:var(--text-muted);font-size:7px;padding:6px;">Немає предметів</div>`; }

            html += `</div></div>
                <div class="card"><div class="card-title">🎯 Бажані предмети</div><div class="inventory-grid">`;
            UPGRADE_ITEMS.forEach(item => {
                html += `<div class="inv-item ${G.selectedItemOut === item.id ? 'selected' : ''}" onclick="G.selectedItemOut='${item.id}';renderUpgrader()">
                    <span class="icon">${item.image}</span>
                    <span class="name">${item.name.slice(0,5)}</span>
                </div>`;
            });
            html += `</div></div>`;
            document.getElementById('game-area').innerHTML = html;
        }

        function performUpgrade() {
            if (!G.selectedItemIn || !G.selectedItemOut) { toast('Виберіть предмети');
                return; }
            if (!G.upgradeInventory[G.selectedItemIn] || G.upgradeInventory[G.selectedItemIn] <= 0) { toast('Немає предмета');
                return; }
            const inItem = UPGRADE_ITEMS.find(i => i.id === G.selectedItemIn);
            const outItem = UPGRADE_ITEMS.find(i => i.id === G.selectedItemOut);
            if (!inItem || !outItem) return;

            const btn = document.querySelector('.upgrade-btn');
            if (btn) {
                btn.style.transform = 'scale(0.9)';
                btn.style.opacity = '0.6';
                btn.textContent = '⏳';
                setTimeout(() => { btn.style.transform = 'scale(1)';
                    btn.style.opacity = '1';
                    btn.textContent = '🚀'; }, 400);
            }

            let chance = Math.min(75, (inItem.price / outItem.price) * 100);
            setTimeout(() => {
                if (Math.random() * 100 <= chance) {
                    G.upgradeInventory[G.selectedItemIn]--;
                    if (G.upgradeInventory[G.selectedItemIn] === 0) delete G.upgradeInventory[G.selectedItemIn];
                    G.upgradeInventory[G.selectedItemOut] = (G.upgradeInventory[G.selectedItemOut] || 0) + 1;
                    toast('✅ Успіх! +' + outItem.name);
                    G.crypto += 0.5;
                    const randGif = GIFS[rand(0, GIFS.length - 1)];
                    addGif(randGif.id);
                    toast('🎨 +' + randGif.id);
                } else {
                    G.upgradeInventory[G.selectedItemIn]--;
                    if (G.upgradeInventory[G.selectedItemIn] === 0) delete G.upgradeInventory[G.selectedItemIn];
                    toast('❌ Невдача! Предмет згорів');
                }
                G.selectedItemIn = null;
                G.selectedItemOut = null;
                saveGame();
                renderUpgrader();
                updateUI();
            }, 500);
        }

        // ============================================================
        //  🐉 БОСИ
        // ============================================================
        function fightBoss(idx) {
            const b = BOSSES[idx];
            if (b.cost > 0 && G.homa < b.cost) { toast(`❌ Потрібно ${b.cost}🟣`);
                return; }
            if (b.id === 0 && Date.now() - G.lastFreeBoss < 600000) {
                toast(`⏳ ${Math.ceil((600000-(Date.now()-G.lastFreeBoss))/60000)} хв`);
                return;
            }
            if (b.cost > 0) G.homa -= b.cost;
            if (b.id === 0) G.lastFreeBoss = Date.now();
            toast('⚔️ Битва...');
            setTimeout(() => {
                let chance = b.chance + (G.level - 1) * 0.03 + (G.luck - 1) * 0.05 + G.upgrades.luckB * 0.1;
                chance = clamp(chance, 0.05, 0.85);
                if (Math.random() < chance) {
                    if (b.rewardMin > 0) {
                        let reward = rand(b.rewardMin, b.rewardMax);
                        G.homa += reward;
                        toast(`🎉 Перемога! +${reward}🟣`);
                    } else {
                        let rew = ['gif', 'homa', 'title', 'chest', 'crypto', 'crypto2', 'eventHoma', 'upgrade_item'][rand(
                            0, 7)];
                        if (rew === 'gif') {
                            let av = GIFS.filter(g => !g.id.includes('⚔️'));
                            let g = av[rand(0, av.length - 1)];
                            addGif(g.id);
                            toast('🎨 +' + g.id);
                        } else if (rew === 'homa') { let a = rand(10, 50);
                            G.homa += a;
                            toast('🟣 +' + a); } else if (rew === 'crypto') { let a = rand(1, 10) / 100;
                            G.crypto += a;
                            toast(`₿ +${a.toFixed(2)}`); } else if (rew === 'crypto2') { let a = rand(1, 10);
                            G.crypto2 += a;
                            toast(`🪙 +${a} T HAM`); } else if (rew === 'eventHoma') { let a = rand(1, 5);
                            G.eventHoma += a;
                            toast(`🌸 +${a}`); } else if (rew === 'upgrade_item') {
                            const items = UPGRADE_ITEMS.filter(i => i.price < 100000000);
                            const item = items[rand(0, items.length - 1)];
                            G.upgradeInventory[item.id] = (G.upgradeInventory[item.id] || 0) + 1;
                            toast(`🔧 +${item.name}`);
                        } else if (rew === 'title') {
                            let titles = ['king', 'lord', 'knight', 'hamka', 'pro', 'player', 'noob', 'cyber',
                            'neon'];
                            let nt = titles[rand(0, titles.length - 1)];
                            addTitle(nt);
                            toast('🏅 ' + (TITLES[nt]?.name || nt));
                        } else {
                            let ct = ['common', 'rare', 'epic', 'mythic'][rand(0, 3)];
                            G.chests[ct] = (G.chests[ct] || 0) + 1;
                            toast('🎁 Ящик в інвентарі!');
                        }
                    }
                } else { toast('💀 Поразка...'); }
                saveGame();
                renderBosses();
                updateUI();
            }, 1500);
        }

            if (G.eventHoma < cost) { toast('❌ Не вистачає івенхом');

            G.eventHoma -= cost;

                msg = '';

                if (r < 0.34) { G.homa += 5;
                    msg = '5 хом'; } else if (r < 0.6) { G.homa += 20;
                    msg = '20 хом'; } else if (r < 0.75) { addGif('☀️');
                    msg = 'гіфка ☀️'; } else if (r < 0.85) { addGif('🏖️');
                    msg = 'гіфка 🏖️'; } else if (r < 0.95) { addTitle('letniy');

                    msg = '150 хом'; } else { addTitle('leto');

                    msg = '150 хом'; } else if (r < 0.55) { addGif('☀️');

        function spinSlot() {
            let bet = parseInt(document.getElementById('bet')?.value) || 0;
            if (!bet || bet < 1) { toast('Введіть ставку >0');
                return; }
            if (G.coins < bet) { toast('❌ Не вистачає монет');
                return; }
            G.coins -= bet;
            const sym = ['🍒', '🍋', '🍉', '⭐', '7️⃣', '💎'];
            let r1 = sym[rand(0, 5)],
                r2 = sym[rand(0, 5)],
                r3 = sym[rand(0, 5)];
            document.querySelectorAll('.slot').forEach(el => el.classList.add('spinning'));
            setTimeout(() => { document.querySelectorAll('.slot').forEach(el => el.classList.remove('spinning')); }, 300);
            document.getElementById('s1').textContent = r1;
            document.getElementById('s2').textContent = r2;
            document.getElementById('s3').textContent = r3;
            let win = 0;
            if (r1 === r2 && r2 === r3) win = bet * 3;
            else if (r1 === r2 || r2 === r3 || r1 === r3) win = Math.floor(bet * 1.5);
            win = Math.floor(win * G.luck);
            G.coins += win;
            if (win > 0) { addXP(Math.floor(win / 5));
                toast(`🎉 Виграш! +${win}💰`); } else { toast(`😢 Програш -${bet}💰`); }
            updateUI();
            saveGame();
        }

        function checkLevelUp() {
            let lvl = 1;
            for (let i = LEVELS.length - 1; i >= 0; i--) {
                if (G.xp >= LEVELS[i].x) { lvl = LEVELS[i].l; break; }
            }
            if (lvl > G.level) {
                let reward = 0;
                for (let i = G.level + 1; i <= lvl; i++) { reward += getLevelReward(i); }
                G.coins += reward;
                const newLevelName = getLevelName(lvl);
                toast(`🎉 Новий рівень: ${newLevelName}! +${reward}💰`);
                G.level = lvl;
            } else {
                G.level = lvl;
            }
        }

        function saveGame() {
            if (!G.uid) {
                try {
                    const data = { ...G };
                    delete data.cryptoHistory;
                    delete data.crypto2History;
                    localStorage.setItem('hamka_guest_save', JSON.stringify(data));
                } catch (e) {}
                return;
            }
            G.lastSave = Date.now();
            const data = { ...G };
            data.lastUpdate = Date.now();
            db.ref('users/' + G.uid).set(data).catch(e => console.warn('Save error:', e));
            updatePublicProfile();
        }

        function loadGame(data) {
            if (!data) return;
            Object.keys(data).forEach(key => {
                if (key === 'upgrades') { Object.assign(G.upgrades, data.upgrades); } else if (key ===
                    'ownedGifs') { G.ownedGifs = data.ownedGifs || { '🐹': 1 }; } else if (key ===
                    'ownedTitles') { G.ownedTitles = data.ownedTitles || { 'none': 1 }; } else if (key ===
                    'chests') { G.chests = data.chests || {}; } else if (key === 'upgradeInventory') { G
                        .upgradeInventory = data.upgradeInventory || {}; } else if (key === 'marketListings') { G
                        .marketListings = data.marketListings || []; } else if (key === 'cryptoHistory') { G
                        .cryptoHistory = data.cryptoHistory || []; } else if (key === 'crypto2History') { G
                        .crypto2History = data.crypto2History || []; } else if (key === 'seasonPoints') { G
                        .seasonPoints = data.seasonPoints || 0; } else if (key === 'seasonRewardClaimed') { G
                        .seasonRewardClaimed = data.seasonRewardClaimed || false; } else if (key === 'skins') {
                    if (data.skins) {
                        if (data.skins.plow) Object.assign(G.skins.plow, data.skins.plow);
                        if (data.skins.ronaldo) Object.assign(G.skins.ronaldo, data.skins.ronaldo);
                    }
                } else if (key === 'ownedShopSkins') { G.ownedShopSkins = data.ownedShopSkins || []; } else if (
                    key === 'activeShopSkin') { G.activeShopSkin = data.activeShopSkin || null; } else if (key ===
                    'season') { G.season = data.season || 2; } else if (key === 'lastUpdate') { G.lastUpdate =
                        data.lastUpdate || Date.now(); } else if (key === 'isGuest') { G.isGuest = data
                        .isGuest || false; } else { G[key] = data[key]; }
            });
            G.maxEnergy = calcMaxEnergy();
            G.energy = Math.min(G.energy, G.maxEnergy);
            G.name = G.name || 'Гравець';
            if (!G.season) G.season = 2;
            checkLevelUp();
            updateUI();
            setTimeout(updateTapButton, 100);
        }

        // ============================================================
        //  🔄 КОНВЕРТАЦІЯ ГОСТЯ В АКАУНТ
        // ============================================================
        async function convertGuestToAccount() {
            if (!G.isGuest) { toast('Ви вже маєте акаунт'); return; }
            if (!auth) { toast('Firebase не готовий'); return; }

            const error = document.getElementById('authError');
            const success = document.getElementById('authSuccess');

            const nick = prompt('Введіть нікнейм для акаунта (мін. 3 символи):');
            if (!nick || nick.length < 3) { toast('Нік має бути не менше 3 символів'); return; }

            const pass = prompt('Введіть пароль (мін. 4 символи):');
            if (!pass || pass.length < 4) { toast('Пароль має бути не менше 4 символів'); return; }

            try {
                const guestData = { ...G };
                const guestUid = G.uid;

                const email = nick.toLowerCase().replace(/[^a-z0-9]/g, '') + '@hamka.ua';
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const newUid = userCredential.user.uid;

                G.uid = newUid;
                G.isGuest = false;
                G.name = nick;
                G.isTelegramUser = false;

                await db.ref('users/' + newUid).set({
                    ...guestData,
                    uid: newUid,
                    name: nick,
                    isGuest: false,
                    isTelegramUser: false,
                    lastUpdate: Date.now()
                });

                if (guestUid) {
                    try {
                        await db.ref('users/' + guestUid).remove();
                        await db.ref('public_users/' + guestUid).remove();
                    } catch (e) {
                        console.warn('Old guest data deletion error:', e);
                    }
                }

                loadGame({ ...guestData, uid: newUid, name: nick, isGuest: false });
                saveGame();

                toast('✅ Акаунт створено! Ваш прогрес збережено.');
                if (success) success.textContent = '✅ Акаунт створено!';
                if (error) error.textContent = '';

                renderProfile();
                updateUI();

            } catch (e) {
                console.error('Conversion error:', e);
                if (e.code === 'auth/email-already-in-use') {
                    toast('❌ Користувач з таким ніком вже існує');
                } else {
                    toast('❌ Помилка: ' + e.message);
                }
                if (error) error.textContent = '❌ ' + e.message;
            }
        }
